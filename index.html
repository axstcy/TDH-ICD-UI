<!DOCTYPE html>
<html>
<head>
  <title>ICD Patient Entry</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    body { font-family: Arial; padding: 20px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { padding: 6px; text-align: center; }
    input, select { width: 100%; }
    .error { border: 2px solid red; }
  </style>
</head>
<body>

<h2>The Doctors' Hospital VII-7 Chapter Negros Island</h2>

<label>Month/Year:</label>
<input type="month" id="monthYear" required>

<br><br>

<label>No. of Discharges:</label>
<input type="number" id="discharges" readonly>

<br><br>

<button onclick="addRow()">Add Patient</button>
<button onclick="downloadExcel()">Download Excel</button>

<br><br>

<table border="1" id="patientTable">
  <thead>
    <tr>
      <th>#</th>
      <th>Full Name</th>
      <th>Initial</th>
      <th>Type</th>
      <th>Sex</th>
      <th>Weight</th>
      <th>DOB</th>
      <th>Admitted</th>
      <th>Discharged</th>
      <th>Outcome</th>
      <th>Primary Diagnosis</th>
      <th>Primary ICD</th>
      <th>Secondary Diagnosis</th>
      <th>Secondary ICD</th>
      <th>Tertiary Diagnosis</th>
      <th>Tertiary ICD</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
let count = 0;

// ⚠️ REPLACE THIS WITH YOUR RENDER URL LATER
const API_URL = "https://tdh-ai-icd-repo.onrender.com/predict";

function getInitial(fullName) {
  let parts = fullName.split(',');
  if (parts.length < 2) return '';

  let lastNames = parts[0].trim().split(' ');
  let firstNames = parts[1].trim().split(' ');

  let initials = '';
  lastNames.forEach(n => initials += n[0] || '');
  firstNames.forEach(n => initials += n[0] || '');

  return initials.toUpperCase();
}

function addRow() {
  count++;
  const table = document.getElementById("patientTable").getElementsByTagName('tbody')[0];
  const row = table.insertRow();

  row.innerHTML = `
    <td>${count}</td>
    <td><input type="text" required onchange="updateInitial(this)"></td>
    <td class="initial"></td>
    <td><select><option>OLD</option><option>NEW</option></select></td>
    <td><select><option>M</option><option>F</option></select></td>
    <td><input type="number" required></td>
    <td><input type="date" required></td>
    <td><input type="date" required></td>
    <td><input type="date" required></td>
    <td><select><option>Discharged</option><option>DIED</option></select></td>
    <td><input type="text" onblur="fetchICD(this, 'primary')"></td>
    <td><input type="text" class="primary-icd" readonly></td>
    <td><input type="text" onblur="fetchICD(this, 'secondary')"></td>
    <td><input type="text" class="secondary-icd" readonly></td>
    <td><input type="text" onblur="fetchICD(this, 'tertiary')"></td>
    <td><input type="text" class="tertiary-icd" readonly></td>
  `;

  document.getElementById("discharges").value = count;
}

function updateInitial(input) {
  const row = input.parentElement.parentElement;
  row.querySelector('.initial').innerText = getInitial(input.value);
}

async function fetchICD(input, type) {
  const diagnosis = input.value;
  if (!diagnosis) return;

  try {
    const response = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text: diagnosis })
    });

    const data = await response.json();
    const icd = data.suggestions?.[0]?.code || "N/A";

    const row = input.parentElement.parentElement;
    row.querySelector(`.${type}-icd`).value = icd;
  } catch (err) {
    console.error(err);
  }
}

function downloadExcel() {
  const rows = document.querySelectorAll("#patientTable tbody tr");
  let data = [];

  for (let row of rows) {
    let inputs = row.querySelectorAll("input[required]");
    for (let input of inputs) {
      if (!input.value) {
        input.classList.add("error");
        alert("Please fill all required fields");
        return;
      }
    }

    let cells = row.querySelectorAll("td");

    data.push({
      "No": cells[0].innerText,
      "Patient Initial": cells[2].innerText,
      "Type": cells[3].querySelector("select").value,
      "Sex": cells[4].querySelector("select").value,
      "Weight": cells[5].querySelector("input").value,
      "DOB": cells[6].querySelector("input").value,
      "Admitted": cells[7].querySelector("input").value,
      "Discharged": cells[8].querySelector("input").value,
      "Outcome": cells[9].querySelector("select").value,
      "Primary Diagnosis": cells[10].querySelector("input").value,
      "ICD No.": cells[11].querySelector("input").value,
      "Secondary Diagnosis": cells[12].querySelector("input").value,
      "ICD No.": cells[13].querySelector("input").value,
      "Tertiary Diagnosis": cells[14].querySelector("input").value,
      "ICD No.": cells[15].querySelector("input").value
     
    });
  }

  const worksheet = XLSX.utils.json_to_sheet(data);
  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, "Patients");

  XLSX.writeFile(workbook, "ICD_Patients.xlsx");
}
</script>

</body>
</html>
